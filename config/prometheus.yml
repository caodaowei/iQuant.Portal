# Prometheus 配置文件
# 用于抓取 iQuant 应用程序指标

global:
  scrape_interval: 15s     # 默认抓取间隔
  evaluation_interval: 15s # 规则评估间隔
  scrape_timeout: 10s      # 抓取超时时间

# 告警管理器配置（可选，未来扩展）
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# 规则文件（可选，未来扩展）
# rule_files:
#   - "rules/*.yml"

# 抓取配置
scrape_configs:
  # iQuant FastAPI 应用指标
  - job_name: 'iquant-api'
    static_configs:
      - targets: ['iquant-fastapi:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s  # API 指标更频繁抓取
    scrape_timeout: 5s

  # Prometheus 自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter（系统指标，如果部署在服务器上）
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
