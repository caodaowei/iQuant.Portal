# Grafana Dashboard 自动配置
apiVersion: 1

providers:
  - name: 'iQuant Dashboards'
    orgId: 1
    folder: 'iQuant'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
