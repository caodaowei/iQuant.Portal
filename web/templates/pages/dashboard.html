{% extends "base.html" %}

{% block title %}仪表盘 - iQuant{% endblock %}

{% set active_page = 'dashboard' %}

{% block content %}
<div class="card">
    <h2>📊 系统状态</h2>
    <div class="grid grid-4" id="status-grid">
        <div class="card" style="text-align: center;">
            <div style="color: #666; margin-bottom: 10px;">系统状态</div>
            <div id="system-status" style="font-size: 2em; font-weight: bold;">加载中...</div>
        </div>
        <div class="card" style="text-align: center;">
            <div style="color: #666; margin-bottom: 10px;">数据库</div>
            <div id="db-status" style="font-size: 2em; font-weight: bold;">加载中...</div>
        </div>
        <div class="card" style="text-align: center;">
            <div style="color: #666; margin-bottom: 10px;">策略数量</div>
            <div id="strategy-count" style="font-size: 2em; font-weight: bold; color: #667eea;">-</div>
        </div>
        <div class="card" style="text-align: center;">
            <div style="color: #666; margin-bottom: 10px;">数据库表</div>
            <div id="table-count" style="font-size: 2em; font-weight: bold; color: #667eea;">-</div>
        </div>
    </div>
</div>

<div class="grid grid-2">
    <div class="card">
        <h2>📋 快捷操作</h2>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <a href="/trading" class="btn" style="text-align: center; text-decoration: none;">💰 模拟</a>
            <a href="/positions" class="btn btn-secondary" style="text-align: center; text-decoration: none;">📋 实盘</a>
            <a href="/backtest" class="btn btn-success" style="text-align: center; text-decoration: none;">📈 运行回测</a>
        </div>
    </div>
    
    <div class="card">
        <h2>📈 实盘持仓</h2>
        <div id="positions-preview">
            <p>加载中...</p>
        </div>
        <div style="margin-top: 15px;">
            <a href="/positions" class="btn" style="text-decoration: none;">查看全部</a>
        </div>
    </div>
</div>

<div class="card">
    <h2>📝 最近订单</h2>
    <div id="orders-preview">
        <p>加载中...</p>
    </div>
    <div style="margin-top: 15px;">
        <a href="/trading" class="btn" style="text-decoration: none;">查看全部</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        loadStatus();
        loadStrategies();
        loadTables();
        loadPositionsPreview();
        loadOrdersPreview();
    });
    
    async function loadStatus() {
        try {
            const response = await fetch('/api/status');
            const data = await response.json();
            
            const statusEl = document.getElementById('system-status');
            const dbEl = document.getElementById('db-status');
            
            if (data.status === 'ok') {
                statusEl.innerHTML = '<span style="color: #28a745;">✅ 运行中</span>';
                dbEl.innerHTML = '<span style="color: #28a745;">✅ 已连接</span>';
            } else {
                statusEl.innerHTML = '<span style="color: #dc3545;">❌ 异常</span>';
                dbEl.innerHTML = '<span style="color: #dc3545;">❌ 断开</span>';
            }
        } catch (error) {
            console.error('加载状态失败:', error);
        }
    }
    
    async function loadStrategies() {
        try {
            const response = await fetch('/api/strategies');
            const data = await response.json();
            document.getElementById('strategy-count').textContent = data.count;
        } catch (error) {
            console.error('加载策略失败:', error);
        }
    }
    
    async function loadTables() {
        try {
            const response = await fetch('/api/database/tables');
            const data = await response.json();
            document.getElementById('table-count').textContent = data.count;
        } catch (error) {
            console.error('加载表失败:', error);
        }
    }
    
    async function loadPositionsPreview() {
        try {
            const response = await fetch('/api/trading/positions');
            const data = await response.json();
            
            const container = document.getElementById('positions-preview');
            
            if (data.count === 0) {
                container.innerHTML = '<p style="color: #666;">暂无持仓</p>';
                return;
            }
            
            const rows = data.positions.slice(0, 3).map(p => `
                <div style="display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee;">
                    <span><strong>${p.stock_code}</strong> ${p.stock_name || ''}</span>
                    <span>${p.total_volume}股 @ ¥${p.avg_cost}</span>
                </div>
            `).join('');
            
            container.innerHTML = rows;
        } catch (error) {
            container.innerHTML = '<p style="color: #dc3545;">加载失败</p>';
        }
    }
    
    async function loadOrdersPreview() {
        try {
            const response = await fetch('/api/trading/orders');
            const data = await response.json();
            
            const container = document.getElementById('orders-preview');
            
            if (data.count === 0) {
                container.innerHTML = '<p style="color: #666;">暂无订单</p>';
                return;
            }
            
            const statusLabels = {
                'filled': '<span class="badge badge-success">已成交</span>',
                'submitted': '<span class="badge badge-info">已提交</span>',
                'pending': '<span class="badge badge-warning">待处理</span>',
                'cancelled': '<span class="badge badge-danger">已取消</span>',
            };
            
            const typeLabels = {'buy': '买入', 'sell': '卖出'};
            
            const rows = data.orders.slice(0, 5).map(o => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;">
                    <span>
                        <strong>${o.stock_code}</strong>
                        <span style="color: ${o.trade_type === 'buy' ? '#dc3545' : '#28a745'};">${typeLabels[o.trade_type]}</span>
                        ${o.order_volume}股
                    </span>
                    ${statusLabels[o.status] || o.status}
                </div>
            `).join('');
            
            container.innerHTML = rows;
        } catch (error) {
            container.innerHTML = '<p style="color: #dc3545;">加载失败</p>';
        }
    }
</script>
{% endblock %}
