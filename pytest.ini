[pytest]
# Pytest 配置

# 测试文件模式
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 详细输出
addopts =
    -v
    --strict-markers
    --tb=short
    --capture=no

# 标记
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试
    async_test: 异步测试

# 覆盖率配置（需要 pytest-cov）
[coverage:run]
source =
    core
    web
    strategies
omit =
    */tests/*
    */migrations/*
    */__init__.py

[coverage:report]
show_missing = true
fail_under = 70
